# Application Name
spring.application.name=security-backend


spring.datasource.url=jdbc:postgresql://guardian-db-server.postgres.database.azure.com:5432/guardian-security_database?sslmode=require
spring.datasource.username=guardiansecurity
spring.datasource.driver-class-name=org.postgresql.Driver

// JPA / Hibernate Configuration create, update, validate, none
# Force Hibernate to handle schema management based on JPA entities
spring.jpa.hibernate.ddl-auto=validate
spring.sql.init.mode=never
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
spring.flyway.validate-on-migrate=true

server.port=8080

spring.jpa.show-sql=true 
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=INFO

security.jwt.expiration-time=86400000

