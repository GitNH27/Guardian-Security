name: Build and Deploy Backend

on:
  push:
    branches:
      - main
    paths:
      - 'security-backend/**' # Only trigger when backend code changes
      - '.github/workflows/**' 

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'microsoft'
          cache: 'maven'

      - name: Build with Maven
        run: |
          cd security-backend
          chmod +x mvnw
          ./mvnw clean package -DskipTests

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'guardian-backend-api-cehse7acc4bfhcdq'
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: 'security-backend/target/*.jar'